services:
  - type: worker
    name: counselai-pipeline
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: POLL_INTERVAL_HOURS
        value: 6
      - key: MIN_CONFIDENCE
        value: 0.6
      - key: DB_PATH
        value: storage/counselai.db
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: pipeline-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
